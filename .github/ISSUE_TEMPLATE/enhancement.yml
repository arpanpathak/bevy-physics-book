name: "✨ Enhancement / Idea"
description: "Suggest an improvement or new feature"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! ✨

  - type: dropdown
    id: type
    attributes:
      label: "💡 Type"
      options:
        - "New chapter topic"
        - "Improved code example"
        - "Better explanation / diagrams"
        - "New physics concept to cover"
        - "Tooling / automation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: "💭 Your Idea"
      description: "What would you like to see added or changed?"
      placeholder: "I think the book would benefit from a chapter on..."
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: "🎯 Why is this valuable?"
      description: "How does this help readers?"
      placeholder: "This would help beginners understand..."
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: "🤝 Would you like to contribute this?"
      options:
        - label: "Yes, I'd like to work on this!"
        - label: "I'm just suggesting — someone else can implement"
