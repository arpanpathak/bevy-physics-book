name: "🐛 Bug Report"
description: "Something isn't working correctly"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! 🐛

  - type: dropdown
    id: area
    attributes:
      label: "📚 Area"
      description: "Which part of the book/code is affected?"
      options:
        - "Code example (compilable crate)"
        - "Physics sandbox"
        - "Book content (chapter text)"
        - "Math explanation"
        - "Diagrams/visuals"
        - "Build/deployment"
    validations:
      required: true

  - type: input
    id: chapter
    attributes:
      label: "📖 Chapter"
      description: "Which chapter number? (e.g., ch03)"
      placeholder: "ch03"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: "📝 Description"
      description: "What's wrong? Be specific!"
      placeholder: "The vector normalization example gives incorrect results when..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ Expected behavior"
      placeholder: "The code should output x=0.707, y=0.707"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "❌ Actual behavior"
      placeholder: "It outputs x=0.0, y=0.0"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "🖥️ Environment"
      description: "Rust version, OS, Bevy version"
      value: |
        - Rust: (run `rustc --version`)
        - OS: 
        - Bevy: 0.15
    validations:
      required: true
